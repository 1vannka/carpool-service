spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/carpool}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
app:
  admin:
    email: ${ADMIN_EMAIL}
    password: ${ADMIN_PASSWORD}